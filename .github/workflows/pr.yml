name: PR
on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    name: PR
    runs-on: ubuntu-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Install dependencies
        run: pnpm build